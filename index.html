<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى ليلى 🌸</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* تأثير تساقط القلوب */
        .heart-fall {
            position: absolute;
            color: #ffb6c1;
            font-size: 20px;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 1;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3);
            text-align: center;
            width: 90%;
            max-width: 380px;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h2 { 
            color: #d87093; 
            margin-bottom: 20px; 
            font-size: 24px; 
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 2px solid #ffe4e1;
            border-radius: 12px;
            font-size: 16px;
            text-align: center;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            transition: 0.3s;
        }

        input:focus {
            border-color: #ffb6c1;
            box-shadow: 0 0 10px rgba(255, 182, 193, 0.5);
        }

        button {
            background: #ffb6c1;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.4);
            transition: 0.3s;
        }

        button:hover {
            background: #ff99aa;
            transform: translateY(-2px);
        }

        .btn-group { 
            display: flex; 
            gap: 12px; 
            margin-top: 20px; 
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
        }

        .btn-group.show {
            opacity: 1;
            visibility: visible;
        }

        .btn-yes { background: #98fb98; color: #2e8b57; box-shadow: 0 5px 15px rgba(152, 251, 152, 0.4); }
        .btn-yes:hover { background: #85e885; }
        
        .btn-no { background: #ffe4e1; color: #cd5c5c; box-shadow: 0 5px 15px rgba(255, 228, 225, 0.4); }
        .btn-no:hover { background: #ffd1cc; }

        #page2, #page3 { display: none; }

        #typingMessage {
            font-size: 19px;
            line-height: 1.7;
            color: #555;
            text-align: right;
            margin-bottom: 20px;
            min-height: 60px;
        }

        .big-heart {
            font-size: 60px;
            color: #ff69b4;
            animation: pulse 1s infinite alternate;
            margin-bottom: 15px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }
    </style>
</head>
<body>

    <div class="box" id="page1">
        <h2>مرحباً يا ليلى 🌸</h2>
        <input type="password" id="passInput" placeholder="أدخلي كلمة السر الخاصة بكِ...">
        <button onclick="checkPass()">دخول</button>
    </div>

    <div class="box" id="page2">
        <div id="typingMessage"></div>
        <div class="btn-group" id="buttonsTeam">
            <button class="btn-yes" onclick="goTrue()">قبلت اعتذارك</button>
            <button class="btn-no" onclick="goFalse()">مقبلتش اعتذارك</button>
        </div>
    </div>

    <div class="box" id="page3">
        <div class="big-heart">💖</div>
        <h2 style="color: #ff69b4; margin-bottom: 0;">أنا بحبك أوي</h2>
    </div>

    <script>
        // تأثير إنشاء القلوب المتساقطة تلقائياً
        function createHearts() {
            const heartSymbols = ['❤️', '💖', '🌸', '💕'];
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart-fall');
                heart.innerText = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = Math.random() * 3 + 2 + 's';
                heart.style.fontSize = Math.random() * 15 + 15 + 'px';
                document.body.appendChild(heart);
                
                setTimeout(() => { heart.remove(); }, 5000);
            }, 400);
        }
        createHearts();

        // التحقق من الباسورد
        function checkPass() {
            var input = document.getElementById("passInput").value.trim();
            if (input.toLowerCase() === "lilly") {
                document.getElementById("page1").style.display = "none";
                document.getElementById("page2").style.display = "block";
                startTyping();
            } else {
                alert("كلمة السر مش صح يا ليلى! ركزي 🥺");
            }
        }

        // تأثير الكتابة حرف بحرف للرسالة
        function startTyping() {
            var txt = "أنا آسف يا ليلى إني زعلتك.. أنا مش هكدب عليكي تاني مهما حصل، وأتمنى تقبلي اعتذاري المرة دي بس.. ✨";
            var i = 0;
            var container = document.getElementById("typingMessage");
            container.innerHTML = "";

            function type() {
                if (i < txt.length) {
                    container.innerHTML += txt.charAt(i);
                    i++;
                    setTimeout(type, 50); // سرعة الكتابة
                } else {
                    // إظهار الأزرار بعد انتهاء الكلام
                    document.getElementById("buttonsTeam").classList.add("show");
                }
            }
            type();
        }

        // لو وافقت
        function goTrue() {
            document.getElementById("page2").style.display = "none";
            document.getElementById("page3").style.display = "block";
        }

        // لو رفضت (الخيار المشاكس)
        function goFalse() {
            alert("لا يا حبيبتي مفيش الأوبشن ده.. هتقبلي اعتذاري بالعافية! 😤❤️");
        }
    </script>
</body>
</html>
