<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى ليلى</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #f4f6f9;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .box {
            background: white;
            padding: 30px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            width: 90%;
            max-width: 380px;
        }
        h2 { color: #4a5568; margin-bottom: 20px; font-size: 22px; }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }
        button {
            background: #5a738e;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-yes { background: #2a9d8f; }
        .btn-no { background: #e76f51; }
        #page2, #page3 { display: none; }
        #typingMessage {
            font-size: 18px;
            line-height: 1.6;
            color: #4a5568;
            text-align: right;
            margin-bottom: 20px;
            min-height: 60px;
        }
    </style>
</head>
<body>

    <div class="box" id="page1">
        <h2>مرحباً يا ليلى 🌸</h2>
        <input type="password" id="passInput" placeholder="أدخلي كلمة السر...">
        <button onclick="checkPass()">دخول</button>
    </div>

    <div class="box" id="page2">
        <div id="typingMessage"></div>
        <div class="btn-group">
            <button class="btn-yes" onclick="goTrue()">قبلت اعتذارك</button>
            <button class="btn-no" onclick="goFalse()">مقبلتش اعتذارك</button>
        </div>
    </div>

    <div class="box" id="page3">
        <h2 style="color: #e63946;">❤️ أنا بحبك أوي ❤️</h2>
    </div>

    <script>
        function checkPass() {
            var input = document.getElementById("passInput").value.trim();
            if (input.toLowerCase() === "lilly") {
                document.getElementById("page1").style.style.display = "none";
                document.getElementById("page2").style.display = "block";
                startTyping();
            } else {
                alert("كلمة السر مش صح يا ليلى! ركزي 🥺");
            }
        }

        function startTyping() {
            var txt = "أنا آسف يا ليلى إني زعلتك.. أنا مش هكدب عليكي تاني مهما حصل، وأتمنى تقبلي اعتذاري المرة دي بس.. ✨";
            var i = 0;
            var container = document.getElementById("typingMessage");
            container.innerHTML = "";

            function type() {
                if (i < txt.length) {
                    container.innerHTML += txt.charAt(i);
                    i++;
                    setTimeout(type, 50);
                }
            }
            type();
        }

        function goTrue() {
            document.getElementById("page2").style.display = "none";
            document.getElementById("page3").style.display = "block";
        }

        function goFalse() {
            alert("لا يا حبيبتي مفيش الأوبشن ده.. هتقبلي اعتذاري بالعافية! 😤❤️");
        }
    </script>
</body>
</html>
